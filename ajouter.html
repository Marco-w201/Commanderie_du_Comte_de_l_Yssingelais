<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Nouvel article — Administration — Commanderie du Comté de l'Yssingelais</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-page">
  <header class="admin-header">
    <div class="admin-header-inner">
      <a href="index.html" class="admin-brand">
        <img src="logo.png" alt="Admin — Commanderie">
        <span>Admin — Commanderie</span>
      </a>
      <nav class="admin-nav">
        <a href="admin.html" class="admin-nav-link">Tableau de bord</a>
        <a href="admin.html#adherents" class="admin-nav-link">Adhérents</a>
        <a href="admin.html#articles" class="admin-nav-link active">Articles</a>
      </nav>
      <a href="index.html" class="btn btn-outline btn-sm">
        <span class="material-symbols-outlined">arrow_back</span> Site public
      </a>
    </div>
  </header>

  <div class="admin-layout">
    <section class="admin-section active">
      <div class="admin-section-header">
        <h2>Nouvel article</h2>
        <a href="admin.html#articles" class="btn btn-outline">← Retour</a>
      </div>

      <form id="articleForm" accept-charset="UTF-8" class="ajouter-form" novalidate>
        <div class="form-group">
          <label for="articleTitre">Titre *</label>
          <input type="text" id="articleTitre" name="Titre" required maxlength="255" placeholder="Titre de l'article" autofocus>
        </div>

        <div class="form-group">
          <label for="articleDescription">Description</label>
          <textarea id="articleDescription" name="Description" rows="12" maxlength="10000" placeholder="Contenu de l'article..."></textarea>
        </div>

        <div class="form-group">
          <label>Image (max 5 Mo, formats image uniquement)</label>
          <div class="file-upload-area" id="fileUploadArea">
            <span class="material-symbols-outlined file-upload-icon">image</span>
            <p class="file-upload-text">Cliquez ou glissez-déposez une image ici</p>
            <input type="file" id="articleImage" accept="image/*" class="file-upload-input">
          </div>
          <div id="imagePreview" class="image-preview">
            <img id="previewImg" src="" alt="Aperçu">
            <button type="button" id="removeImage" class="btn btn-sm btn-outline" style="margin-top:0.75rem">Supprimer l'image</button>
          </div>
          <div id="imageError" class="form-message" style="display:none"></div>
        </div>

        <div class="form-submit">
          <button type="submit" class="btn btn-gold btn-lg">Publier l'article</button>
          <a href="admin.html#articles" class="btn btn-outline btn-lg">Annuler</a>
        </div>
      </form>
      <div id="formMessage" class="form-message"></div>
    </section>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
  <script>
    (function () {
      if (!sessionStorage.getItem('adminLoggedIn')) {
        window.location.href = 'login.html';
        return;
      }

      var form = document.getElementById('articleForm');
      var titreInput = document.getElementById('articleTitre');
      var descInput = document.getElementById('articleDescription');
      var fileInput = document.getElementById('articleImage');
      var fileArea = document.getElementById('fileUploadArea');
      var previewWrap = document.getElementById('imagePreview');
      var previewImg = document.getElementById('previewImg');
      var removeBtn = document.getElementById('removeImage');
      var imageError = document.getElementById('imageError');
      var formMessage = document.getElementById('formMessage');
      var currentFileDataUrl = null;

      function escapeHtml(str) {
        var el = document.createElement('span');
        el.appendChild(document.createTextNode(str));
        return el.innerHTML;
      }

      function showError(msg) {
        formMessage.textContent = msg;
        formMessage.className = 'form-message error';
      }

      function showSuccess(msg) {
        formMessage.textContent = msg;
        formMessage.className = 'form-message success';
      }

      function clearMessage() {
        formMessage.className = 'form-message';
        formMessage.textContent = '';
      }

      function validateImage(file) {
        return new Promise(function (resolve, reject) {
          if (!file) {
            resolve(null);
            return;
          }

          if (file.size > 5 * 1024 * 1024) {
            reject(new Error("L'image ne doit pas dépasser 5 Mo."));
            return;
          }

          if (file.type.indexOf('image/') !== 0) {
            reject(new Error("Le fichier doit être une image."));
            return;
          }

          var reader = new FileReader();
          reader.onload = function (e) {
            var img = new Image();
            img.onload = function () {
              resolve(e.target.result);
            };
            img.onerror = function () {
              reject(new Error("Le fichier sélectionné n'est pas une image valide."));
            };
            img.src = e.target.result;
          };
          reader.onerror = function () {
            reject(new Error('Erreur lors de la lecture du fichier.'));
          };
          reader.readAsDataURL(file);
        });
      }

      function resetImageUpload() {
        fileInput.value = '';
        currentFileDataUrl = null;
        previewWrap.style.display = 'none';
        previewImg.src = '';
        fileArea.style.display = '';
        imageError.style.display = 'none';
        imageError.textContent = '';
      }

      fileInput.addEventListener('change', function () {
        var file = fileInput.files[0];
        if (!file) {
          resetImageUpload();
          return;
        }

        imageError.style.display = 'none';
        imageError.textContent = '';

        validateImage(file).then(function (dataUrl) {
          currentFileDataUrl = dataUrl;
          previewImg.src = dataUrl;
          previewWrap.style.display = '';
          fileArea.style.display = 'none';
        }).catch(function (err) {
          imageError.textContent = err.message;
          imageError.className = 'form-message error';
          imageError.style.display = '';
          fileInput.value = '';
          currentFileDataUrl = null;
        });
      });

      removeBtn.addEventListener('click', resetImageUpload);

      // Drag & drop support
      fileArea.addEventListener('dragover', function (e) {
        e.preventDefault();
        fileArea.classList.add('drag-over');
      });

      fileArea.addEventListener('dragleave', function () {
        fileArea.classList.remove('drag-over');
      });

      fileArea.addEventListener('drop', function (e) {
        e.preventDefault();
        fileArea.classList.remove('drag-over');
        if (e.dataTransfer.files.length) {
          fileInput.files = e.dataTransfer.files;
          fileInput.dispatchEvent(new Event('change'));
        }
      });

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        clearMessage();

        var titre = titreInput.value.trim();
        var description = descInput.value.trim();

        if (!titre) {
          showError('Le titre est obligatoire.');
          titreInput.focus();
          return;
        }

        var db = getDB();
        if (typeof db.nextArticleId === 'undefined') {
          db.nextArticleId = (db.articles && db.articles.length) ? Math.max.apply(null, db.articles.map(function (a) { return a.id; })) + 1 : 1;
        }
        var article = {
          id: db.nextArticleId++,
          Titre: escapeHtml(titre),
          Description: description ? escapeHtml(description) : null,
          Lien_image: currentFileDataUrl,
          Date_publication: new Date().toISOString()
        };

        if (!db.articles) db.articles = [];
        db.articles.push(article);
        saveDB(db);

        showSuccess('Article publié avec succès ! Redirection...');
        form.querySelector('button[type="submit"]').disabled = true;

        setTimeout(function () {
          window.location.href = 'admin.html#articles';
        }, 1500);
      });
    })();
  </script>
</body>
</html>
