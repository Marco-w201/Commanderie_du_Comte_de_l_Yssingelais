<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Commanderie du Comté de l'Yssingelais</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="auth-logo">
          <span class="material-symbols-outlined icon-shield">shield</span>
        </a>
        <h1>Connexion</h1>
        <p>Espace membres — Commanderie du Comté de l'Yssingelais</p>
      </div>
      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Adresse e-mail</label>
          <input type="email" id="loginEmail" name="Mail" required placeholder="votre@email.fr">
        </div>
        <div class="form-group">
          <label for="loginPassword">Mot de passe</label>
          <input type="password" id="loginPassword" name="Mot_de_passe" required placeholder="Votre mot de passe">
        </div>
        <div class="form-group-checkbox">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe">
            <span>Se souvenir de moi</span>
          </label>
        </div>
        <button type="submit" class="btn btn-gold btn-full">Se connecter</button>
      </form>
      <div id="loginMessage" class="form-message"></div>
      <div class="auth-footer">
        <a href="index.html#adhesion">Pas encore membre ? Rejoignez-nous</a>
        <a href="index.html">Retour à l'accueil</a>
      </div>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
